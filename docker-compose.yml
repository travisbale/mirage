services:
  miraged:
    image: mirage:latest
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped
    volumes:
      - /etc/mirage:/etc/mirage:ro
      - /var/lib/mirage:/var/lib/mirage
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
