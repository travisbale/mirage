{% extends "card.html" %}

{% block title %}Reset password — Vault{% endblock %}

{% block card %}
    <h1 class="text-xl font-semibold mb-1">Reset your password</h1>
    <p class="text-sm text-gray-500 mb-7">Enter your email and we'll send you a reset link.</p>

    {% if sent %}
    <div class="bg-emerald-50 border border-emerald-200 text-emerald-700 text-sm rounded-lg px-3 py-2.5 mb-4">
      If that address is registered, a reset link is on its way.
    </div>
    {% endif %}

    <form method="post" action="http://login.target.local/forgot">
      <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" autofocus required
        class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent mb-5" />

      <button type="submit"
        class="w-full py-2.5 bg-indigo-500 hover:bg-indigo-600 text-white text-sm font-semibold rounded-lg transition-colors">
        Send reset link
      </button>
    </form>

    <p class="mt-5 text-center text-sm text-gray-500">
      Remembered it? <a href="http://login.target.local/login" class="text-indigo-500 hover:underline">Sign in</a>
    </p>
{% endblock %}
