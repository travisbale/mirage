{% extends "card.html" %}

{% block title %}Sign in — Vault{% endblock %}

{% block card %}
    <h1 class="text-xl font-semibold mb-1">Sign in</h1>
    <p class="text-sm text-gray-500 mb-7">Authenticate with the Vault API.</p>

    <div id="error" class="bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg px-3 py-2.5 mb-4 hidden"></div>

    <div id="step-login">
      <form id="login-form">
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" autofocus required
          class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent mb-4" />

        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required
          class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent mb-5" />

        <button type="submit" id="login-btn"
          class="w-full py-2.5 bg-indigo-500 hover:bg-indigo-600 text-white text-sm font-semibold rounded-lg transition-colors">
          Sign in
        </button>
      </form>
    </div>

    <div id="step-mfa" class="hidden">
      <p class="text-sm text-gray-500 mb-4">Enter the 6-digit code from your authenticator app.</p>
      <form id="mfa-form">
        <label for="code" class="block text-sm font-medium text-gray-700 mb-1">Verification code</label>
        <input type="text" id="code" name="code" maxlength="6" inputmode="numeric" pattern="[0-9]{6}"
          placeholder="000000" autocomplete="one-time-code" autofocus required
          class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm text-center tracking-widest focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent mb-5" />

        <button type="submit" id="mfa-btn"
          class="w-full py-2.5 bg-indigo-500 hover:bg-indigo-600 text-white text-sm font-semibold rounded-lg transition-colors">
          Verify
        </button>
      </form>
    </div>

  <script src="{{ url_for('static', filename='js/api-auth.js') }}"></script>
  <script>
    var API_HOST = "https://api.target.local";
    apiAuth(API_HOST + "/auth", API_HOST + "/auth/mfa", "{{ url_for('dashboard') }}");
  </script>
{% endblock %}
