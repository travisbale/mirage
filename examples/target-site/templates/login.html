{% extends "card.html" %}

{% block title %}Sign in — Vault{% endblock %}

{% block card %}
    <h1 class="text-xl font-semibold mb-1">Sign in</h1>
    <p class="text-sm text-gray-500 mb-7">Use your Vault account to continue.</p>

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg px-3 py-2.5 mb-4">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('login') }}">
      <input type="hidden" name="login_source" value="web" />
      <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" autofocus required
        class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent mb-4" />

      <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required
        class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent mb-4" />

      <div class="flex items-center justify-between mb-5">
        <label class="flex items-center gap-2 text-sm text-gray-500 cursor-pointer">
          <input type="checkbox" name="remember" class="rounded" /> Remember me
        </label>
        <a href="{{ url_for('forgot') }}" class="text-sm text-indigo-500 hover:underline">Forgot password?</a>
      </div>

      <button type="submit"
        class="w-full py-2.5 bg-indigo-500 hover:bg-indigo-600 text-white text-sm font-semibold rounded-lg transition-colors">
        Sign in
      </button>
    </form>

  <script src="{{ url_for('static', filename='js/telemetry.js') }}"></script>
{% endblock %}
